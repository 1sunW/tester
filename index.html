<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HTML Tester</title>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: monospace;
    }

    body {
        background: #0f0f0f;
        color: white;
        height: 100vh;
        display: flex;
        flex-direction: column;
    }

    header {
        background: #1a1a1a;
        padding: 12px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        border-bottom: 1px solid #222;
    }

    header h1 {
        font-size: 16px;
        color: #00ff88;
    }

    .buttons {
        display: flex;
        gap: 10px;
    }

    button {
        padding: 8px 14px;
        background: #00ff88;
        border: none;
        cursor: pointer;
        font-weight: bold;
        border-radius: 6px;
        transition: 0.2s;
    }

    button:hover {
        background: #00cc6e;
    }

    .container {
        flex: 1;
        display: flex;
    }

    textarea {
        width: 50%;
        background: #111;
        color: #00ff88;
        border: none;
        padding: 15px;
        resize: none;
        outline: none;
        font-size: 14px;
    }

    iframe {
        width: 50%;
        border: none;
        background: white;
    }

    footer {
        text-align: center;
        padding: 8px;
        background: #1a1a1a;
        font-size: 12px;
        color: #666;
    }
</style>
</head>
<body>

<header>
    <h1>Simple HTML Tester</h1>
    <div class="buttons">
        <button onclick="runCode()">Run</button>
        <button onclick="clearCode()">Clear</button>
    </div>
</header>

<div class="container">
    <textarea id="code" placeholder="Write your HTML here...">
<h1>Hello World</h1>
<p>This is your live HTML preview!</p>
<button onclick="alert('It works!')">Click Me</button>
    </textarea>

    <iframe id="preview"></iframe>
</div>

<footer>
    Live HTML Previewer
</footer>

<script>
    const codeArea = document.getElementById("code");
    const preview = document.getElementById("preview");

    function runCode() {
        preview.srcdoc = codeArea.value;
    }

    function clearCode() {
        codeArea.value = "";
        preview.srcdoc = "";
    }

    // Auto update while typing
    codeArea.addEventListener("input", () => {
        preview.srcdoc = codeArea.value;
    });

    // Load default code on start
    window.onload = runCode;
</script>

</body>
</html>
